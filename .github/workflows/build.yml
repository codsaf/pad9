name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            label: macos-arm64
            artifact-path: build/dist/Pad9.app
          - os: windows-latest
            label: windows-x64
            artifact-path: build/dist/Pad9
          - os: ubuntu-latest
            label: linux-x64
            artifact-path: build/dist/Pad9
    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 (Gradle daemon)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate macOS icon
        if: runner.os == 'macOS'
        run: |
          ICONDIR=src/main/resources/icons
          ICONSET="$ICONDIR/icon.iconset"
          mkdir -p "$ICONSET"
          cp "$ICONDIR/icon-16.png"  "$ICONSET/icon_16x16.png"
          cp "$ICONDIR/icon-32.png"  "$ICONSET/icon_16x16@2x.png"
          cp "$ICONDIR/icon-32.png"  "$ICONSET/icon_32x32.png"
          cp "$ICONDIR/icon-128.png" "$ICONSET/icon_32x32@2x.png"
          cp "$ICONDIR/icon-128.png" "$ICONSET/icon_128x128.png"
          cp "$ICONDIR/icon-256.png" "$ICONSET/icon_128x128@2x.png"
          cp "$ICONDIR/icon-256.png" "$ICONSET/icon_256x256.png"
          cp "$ICONDIR/icon-512.png" "$ICONSET/icon_256x256@2x.png"
          cp "$ICONDIR/icon-512.png" "$ICONSET/icon_512x512.png"
          iconutil -c icns -o "$ICONDIR/icon.icns" "$ICONSET"
          rm -rf "$ICONSET"

      - name: Build app image
        run: ./gradlew packageDist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pad9-${{ matrix.label }}
          path: ${{ matrix.artifact-path }}
          retention-days: 30

  release:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create archives
        run: |
          cd artifacts
          for dir in Pad9-*/; do
            name="${dir%/}"
            tar -czf "${name}.tar.gz" -C "$dir" .
          done

      - name: Release (tagged version)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true

      - name: Release (latest)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          files: artifacts/*.tar.gz
          body: "Automated build from main branch (${{ github.sha }})"
